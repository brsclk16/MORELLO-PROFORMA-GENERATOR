<style>
:root {
  --cherry: #74113D;
  --gold: #B8935A;
  --gold-light: #F7F1E8;
  --text: #2A2622;
  --muted: #8A8479;
  --border: #E8E2D8;
  --bg: #FAF8F4;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 84px; }

.hero { background: linear-gradient(160deg, #1F1B17 0%, #33291F 100%); color: #fff; padding: 28px 20px 24px; text-align: center; }
.hero .logo { font-family: Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 700; letter-spacing: 6px; }
.hero .logo span { color: var(--gold); }
.hero .sub { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.45); margin-top: 3px; }
.hero .pi-badge { display: inline-block; margin-top: 14px; background: rgba(184,147,90,.18); border: 1px solid rgba(184,147,90,.4); color: var(--gold); font-size: 12px; font-weight: 700; padding: 5px 16px; border-radius: 20px; letter-spacing: 1px; }
.hero .date { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 8px; }

.section { padding: 18px 16px; }
.section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

.buyer-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.buyer-name { font-size: 15px; font-weight: 700; }
.buyer-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.item-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.item-img-wrap { width: 100%; height: 150px; background: #F4F0E9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.item-img-wrap img { max-width: 90%; max-height: 90%; object-fit: contain; }
.item-img-wrap .noimg { font-size: 40px; opacity: .3; }
.item-body { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.item-name { font-size: 13.5px; font-weight: 600; line-height: 1.35; flex: 1; }
.item-meta { text-align: right; flex-shrink: 0; }
.item-qty { font-size: 11px; color: var(--muted); }
.item-price { font-size: 15px; font-weight: 700; color: var(--cherry); margin-top: 2px; }
.item-unit { font-size: 10px; color: var(--muted); }

.terms-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 4px 16px; }
.term-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.term-row:last-child { border-bottom: none; }
.term-row .k { color: var(--muted); }
.term-row .v { font-weight: 600; text-align: right; }

.totals-card { background: #fff; border: 1.5px solid var(--gold); border-radius: 14px; padding: 4px 16px; }
.tot-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.tot-row:last-child { border-bottom: none; }
.tot-row.grand { font-size: 17px; font-weight: 800; color: var(--cherry); }
.tot-row .saving { color: #059669; }

.footer-note { padding: 16px 20px 8px; text-align: center; font-size: 10.5px; color: var(--muted); line-height: 1.7; }

.sticky-cta { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); display: flex; align-items: center; gap: 10px; box-shadow: 0 -4px 20px rgba(0,0,0,.08); z-index: 100; }
.cta-total { flex: 1; }
.cta-total .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.cta-total .val { font-size: 18px; font-weight: 800; color: var(--cherry); }
.cta-btn { flex-shrink: 0; display: flex; align-items: center; gap: 7px; background: #25D366; color: #fff; border: none; padding: 12px 18px; border-radius: 26px; font-size: 13.5px; font-weight: 700; cursor: pointer; text-decoration: none; }
.cta-btn:active { transform: scale(.97); }
.cta-approve { background: var(--cherry); }
.cta-approve:disabled { background: #A8A29C; cursor: default; }

/* Approval modal */
.appr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: flex-end; justify-content: center; }
.appr-overlay.open { display: flex; }
.appr-sheet { background: #fff; width: 100%; max-width: 560px; border-radius: 20px 20px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); }
.appr-title { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
.appr-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
.appr-inp { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px; }
.appr-inp:focus { border-color: var(--gold); }
.appr-btn { width: 100%; padding: 14px; background: var(--cherry); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
.appr-btn:disabled { background: #A8A29C; }
.appr-cancel { width: 100%; padding: 12px; background: transparent; color: var(--muted); border: none; font-size: 13px; margin-top: 6px; cursor: pointer; }
.appr-done { text-align: center; padding: 12px 0; }
.appr-done .big { font-size: 44px; margin-bottom: 10px; }
.appr-done .msg { font-size: 15px; font-weight: 700; color: #059669; }
.appr-done .sm { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* Fabric variant selector */
.fab-row { padding: 0 14px 12px; }
.fab-lbl { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.fab-opts { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
.fab-opt { flex-shrink: 0; border: 2px solid var(--border); border-radius: 10px; padding: 5px; background: #fff; cursor: pointer; text-align: center; min-width: 62px; }
.fab-opt.sel { border-color: var(--cherry); background: #FDF4F8; }
.fab-swatch { width: 48px; height: 34px; border-radius: 6px; margin: 0 auto 4px; background-size: cover; background-position: center; border: 1px solid rgba(0,0,0,.08); }
.fab-name { font-size: 9px; font-weight: 600; color: var(--text); white-space: nowrap; }
.fab-opt.sel .fab-name { color: var(--cherry); }

/* Expired screen */
.expired-wrap { padding: 70px 28px; text-align: center; }
.expired-wrap .ei { font-size: 52px; margin-bottom: 16px; }
.expired-wrap h2 { font-size: 18px; margin-bottom: 10px; }
.expired-wrap p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
.expired-wrap a { display: inline-flex; align-items: center; gap: 8px; background: #25D366; color: #fff; padding: 13px 24px; border-radius: 26px; font-size: 14px; font-weight: 700; text-decoration: none; }

.err-wrap { padding: 60px 24px; text-align: center; color: var(--muted); }
.err-wrap .ei { font-size: 44px; margin-bottom: 14px; opacity: .4; }

@media (min-width: 640px) {
  .content-wrap { max-width: 560px; margin: 0 auto; }
  .sticky-cta { max-width: 560px; left: 50%; transform: translateX(-50%); border-radius: 16px 16px 0 0; border: 1px solid var(--border); border-bottom: none; }
}
</style>

function decodePayload() {
  try {
    const hash = location.hash.slice(1);
    if(!hash || hash.startsWith('s=')) return null;
    const json = decodeURIComponent(escape(atob(hash.replace(/-/g,'+').replace(/_/g,'/'))));
    return JSON.parse(json);
  } catch(e) { console.error('decode fail', e); return null; }
}

function decodeB64(b64) {
  try { return JSON.parse(decodeURIComponent(escape(atob(b64.replace(/-/g,'+').replace(/_/g,'/'))))); }
  catch(e) { return null; }
}

async function resolvePayload() {
  const hash = location.hash.slice(1);
  if(hash.startsWith('s=')) {
    const id = hash.slice(2).replace(/[^A-Za-z0-9]/g,'');
    if(!id) return null;
    try {
      const r = await fetch(SUPA_URL+'/rest/v1/proforma_links?id=eq.'+encodeURIComponent(id)+'&select=payload&limit=1', {
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY }
      });
      const rows = await r.json();
      if(Array.isArray(rows) && rows.length && rows[0].payload) return decodeB64(rows[0].payload);
    } catch(e) { console.error('short link fetch fail', e); }
    return null;
  }
  return decodePayload();
}

    }).catch(function(){});
    // First view on this device → notify once

      tgNotify('👁 <b>Proforma görüntülendi</b>\n'+(buyer||'')+' — <b>'+(pi||'')+'</b>');
    }
  } catch(e) {}
}

    + '<div class="section"><div class="section-title">'+t.totals+'</div><div class="totals-card">'
      + (saving>0.01?'<div class="tot-row"><span>'+t.listTotal+'</span><span>'+sym+listTotal.toFixed(2)+'</span></div><div class="tot-row"><span class="saving">'+t.discount+'</span><span class="saving">− '+sym+saving.toFixed(2)+'</span></div>':'')
      + '<div class="tot-row grand"><span>'+t.grand+'</span><span>'+sym+grand.toFixed(2)+'</span></div>'
      + '<div class="tot-row"><span>'+t.deposit+'</span><span>'+sym+(grand*.3).toFixed(2)+'</span></div>'
      + '<div class="tot-row"><span>'+t.balance+'</span><span>'+sym+(grand*.7).toFixed(2)+'</span></div>'
    + '</div></div>'
    + '<div class="footer-note">'+t.prepared+'</div>'
    + '<div class="sticky-cta">'
      + '<div class="cta-total"><div class="lbl">'+t.grand+'</div><div class="val">'+sym+grand.toFixed(2)+'</div></div>'
      + '<button class="cta-btn cta-approve" id="approve-btn" onclick="openApprove()">✓ '+t.approve+'</button>'
      + '<a class="cta-btn" href="'+waHref+'" target="_blank" rel="noopener" title="'+t.ask+'">'
        + '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
      + '</a>'
    + '</div>'
    + '<div class="appr-overlay" id="appr-overlay">'
      + '<div class="appr-sheet" id="appr-sheet">'
        + '<div class="appr-title">'+t.apprTitle+'</div>'
        + '<div class="appr-sub">'+t.apprSub+'</div>'
        + '<input class="appr-inp" id="appr-name" type="text" placeholder="'+t.apprName+'" autocomplete="name">'
        + '<button class="appr-btn" id="appr-submit" onclick="submitApprove()">'+t.apprConfirm+'</button>'
        + '<button class="appr-cancel" onclick="closeApprove()">'+t.apprCancel+'</button>'
      + '</div>'
    + '</div>';

  trackView(d.pi, d.buyer);
  checkAlreadyApproved(d.pi);
}

let PAYLOAD_CACHE = null;
function selectFab(el) {
  const itemIdx = el.dataset.item, fabIdx = el.dataset.fab;
  document.querySelectorAll('.fab-opt[data-item="'+itemIdx+'"]').forEach(function(o){ o.classList.remove('sel'); });
  el.classList.add('sel');
  window.FAB_SELECTIONS[itemIdx] = parseInt(fabIdx);
}

function openApprove() {
  const d = PAYLOAD_CACHE || decodePayload();
  const t = T[d.lang] || T.en;
  // If fabrics defined, require a selection per item
  if(Array.isArray(d.fab) && d.fab.length > 0) {
    for(let i = 0; i < d.items.length; i++) {
      if(window.FAB_SELECTIONS[i] === undefined) {
        alert(t.fabricRequired);
        return;
      }
    }
  }
  document.getElementById('appr-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('appr-name').focus(); }, 150);
}
function closeApprove() { document.getElementById('appr-overlay').classList.remove('open'); }

function submitApprove() {
  const d = PAYLOAD_CACHE || decodePayload();
  const t = T[d.lang] || T.en;
  const name = document.getElementById('appr-name').value.trim();
  if(!name || name.length < 3) { document.getElementById('appr-name').style.borderColor = '#DC2626'; return; }
  const btn = document.getElementById('appr-submit');
  btn.disabled = true; btn.textContent = '…';
  const grand = d.items.reduce(function(s,i){ return s + i.up*i.q; }, 0);

  // Collect fabric selections if any
  let selections = null;
  if(Array.isArray(d.fab) && d.fab.length > 0) {
    selections = d.items.map(function(it, i){
      const f = d.fab[window.FAB_SELECTIONS[i]];
      return { item: it.n, fabric: f ? (f.code || f.name) : null };
    });
  }

  fetch(SUPA_URL + '/rest/v1/proforma_approvals', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ pi: d.pi, buyer: d.buyer || null, approver_name: name, total: grand.toFixed(2)+' '+d.cur, ua: navigator.userAgent.slice(0,180), selections: selections })
  }).then(function(r){
    if(!r.ok) throw new Error('insert failed');
    document.getElementById('appr-sheet').innerHTML = '<div class="appr-done"><div class="big">✅</div><div class="msg">'+t.apprDoneMsg+'</div><div class="sm">'+t.apprDoneSub+'</div></div>';
    markApproved(t);
    try { localStorage.setItem('appr_'+d.pi, name); } catch(e) {}
    // Telegram notify — approval
    let selTxt = '';
    if(selections) selTxt = '\n' + selections.map(function(s){ return '• '+s.item+' → <b>'+s.fabric+'</b>'; }).join('\n');
    tgNotify('✅ <b>ONAY GELDİ</b>\n'+(d.buyer||'')+' — <b>'+d.pi+'</b>\nOnaylayan: '+name+'\nTutar: '+grand.toFixed(2)+' '+d.cur+selTxt);
    setTimeout(closeApprove, 2600);
  }).catch(function(){
    btn.disabled = false; btn.textContent = t.apprConfirm;
    alert('Connection error — please try again / Bağlantı hatası — tekrar deneyin');
  });
}

function markApproved(t) {
  const b = document.getElementById('approve-btn');
  if(b) { b.disabled = true; b.textContent = '✓ '+t.approved; }
}

function checkAlreadyApproved(pi) {
  const d = PAYLOAD_CACHE || decodePayload();
  const t = T[(d&&d.lang)] || T.en;
  // local check (same device)
  try { if(localStorage.getItem('appr_'+pi)) { markApproved(t); return; } } catch(e) {}
  // remote check
  fetch(SUPA_URL + '/rest/v1/proforma_approvals?pi=eq.'+encodeURIComponent(pi)+'&select=id&limit=1', {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY }
  }).then(function(r){ return r.json(); }).then(function(rows){
    if(Array.isArray(rows) && rows.length) markApproved(t);
  }).catch(function(){});
}

function esc(s) { return String(s||'').replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; }); }

render();
window.addEventListener('hashchange', render);
</script>
