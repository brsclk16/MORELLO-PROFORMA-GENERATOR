<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morello Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F3EF; --surface: #FFFFFF; --surface2: #F0EDE7; --surface3: #E8E3DB;
  --border: #DDD8CF; --border-light: #EAE6DF;
  --accent: #1C1C1E; --accent-hover: #2D2D30;
  --gold: #A8843A; --gold-mid: #C4A05A; --gold-light: #F7EFE0; --gold-subtle: #FBF6EC;
  --text: #111111; --text-sec: #4A4540; --muted: #8A8078; --muted-light: #B0AAA0;
  --danger: #B91C1C; --danger-bg: #FEF2F2;
  --green: #15803D; --green-bg: #F0FDF4;
  --blue: #1D4ED8; --blue-bg: #EFF6FF;
  --orange: #C2620A; --orange-bg: #FFF7ED;
  --purple: #7C3AED; --purple-bg: #F5F3FF;
  --radius: 10px; --radius-sm: 7px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; }

.header { background: var(--accent); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #fff; }
.logo span { color: var(--gold-mid); }
.hdr-sub { font-size: 9px; color: rgba(255,255,255,.45); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
.hdr-actions { display: flex; gap: 6px; align-items: center; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all .15s; white-space: nowrap; text-decoration: none; }
.btn:active { transform: scale(.97); }
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: var(--gold-mid); }
.btn-dark-ghost { background: rgba(255,255,255,.1); color: rgba(255,255,255,.85); }
.btn-ghost { background: var(--surface); color: var(--text-sec); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--gold-mid); color: var(--gold); }
.btn-sm { padding: 5px 9px; font-size: 12px; }
.btn-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #FECACA; }

.nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; position: sticky; top: 54px; z-index: 90; }
.nav::-webkit-scrollbar { display: none; }
.nav-tab { flex-shrink: 0; padding: 10px 15px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav-tab.on { color: var(--gold); border-bottom-color: var(--gold); }

.page { display: none; max-width: 1200px; margin: 0 auto; padding-bottom: 40px; }
.page.on { display: block; }

.week-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 9px; padding: 13px 14px 0; }
.ws { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 12px 8px; text-align: center; box-shadow: var(--shadow); }
.ws .v { font-size: 23px; font-weight: 700; font-family: 'Playfair Display', serif; }
.ws .v.gold { color: var(--gold); }
.ws .l { font-size: 9.5px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

.rotation { margin: 11px 14px 0; background: linear-gradient(135deg, var(--gold-subtle), var(--gold-light)); border: 1px solid #E8D9B8; border-radius: var(--radius); padding: 13px 15px; }
.rot-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--gold); margin-bottom: 5px; }
.rot-text { font-size: 13px; color: #6B5320; line-height: 1.55; }
.prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 9px; }
.prog-bar { height: 5px; background: rgba(168,132,58,.15); border-radius: 3px; margin-top: 5px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width .4s; }

.kanban-wrap { padding: 13px 14px; }
.kanban { display: flex; gap: 9px; overflow-x: auto; padding-bottom: 10px; }
.k-col { flex-shrink: 0; width: 225px; }
.k-head { padding: 8px 10px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; display: flex; justify-content: space-between; align-items: center; }
.k-label { font-size: 10.5px; font-weight: 700; letter-spacing: .3px; }
.k-cnt { font-size: 10px; background: rgba(0,0,0,.12); padding: 1px 6px; border-radius: 8px; font-weight: 700; }
.k-body { background: var(--surface2); border: 1px solid var(--border-light); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); min-height: 60px; padding: 6px; display: flex; flex-direction: column; gap: 6px; max-height: 62vh; overflow-y: auto; }
.k-card { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 9px 10px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.04); transition: all .12s; }
.k-card:hover { border-color: var(--gold-mid); box-shadow: 0 2px 8px rgba(168,132,58,.12); }
.k-cname { font-size: 12.5px; font-weight: 600; }
.k-country { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
.k-ch { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.k-tag { font-size: 9.5px; padding: 2px 7px; border-radius: 8px; font-weight: 700; }
.tag-wa { background: var(--green-bg); color: var(--green); }
.tag-mail { background: var(--blue-bg); color: var(--blue); }
.tag-visit { background: var(--gold-light); color: var(--gold); }
.tag-call { background: var(--purple-bg); color: var(--purple); }
.k-date { font-size: 10px; color: var(--muted-light); margin-top: 4px; }
.k-empty { text-align: center; padding: 16px 8px; color: var(--muted-light); font-size: 11.5px; }
.hc-cold .k-head { background: #E7E5F0; } .hc-cold .k-label { color: #5B5680; }
.hc-contacted .k-head { background: #DBEAFE; } .hc-contacted .k-label { color: var(--blue); }
.hc-replied .k-head { background: #DCFCE7; } .hc-replied .k-label { color: var(--green); }
.hc-sample .k-head { background: #FFEDD5; } .hc-sample .k-label { color: var(--orange); }
.hc-order .k-head { background: #D1FAE5; } .hc-order .k-label { color: #047857; }
.hc-dead .k-head { background: #FEE2E2; } .hc-dead .k-label { color: var(--danger); }

.import-card { background: var(--gold-subtle); border: 1px dashed var(--gold-mid); border-radius: var(--radius); padding: 13px 15px; margin: 13px 14px 0; }
.import-title { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.import-sub { font-size: 12px; color: var(--text-sec); margin-bottom: 10px; }
.country-nav { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); background: var(--surface); margin-top: 11px; }
.country-nav::-webkit-scrollbar { display: none; }
.ctab { flex-shrink: 0; padding: 9px 12px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.ctab.on { color: var(--text); border-bottom-color: var(--gold); }
.ctab .cnt { font-size: 10px; background: var(--surface3); border-radius: 8px; padding: 1px 5px; margin-left: 4px; }
.ctab.on .cnt { background: var(--gold); color: #fff; }
.company-list { padding: 11px 14px; }
.company-item { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: flex-start; gap: 11px; box-shadow: 0 1px 2px rgba(0,0,0,.03); transition: all .12s; }
.company-item:hover { border-color: var(--gold-mid); box-shadow: 0 2px 10px rgba(168,132,58,.1); }
.company-main { flex: 1; min-width: 0; }
.company-name { font-size: 14px; font-weight: 600; }
.company-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.company-note { font-size: 11px; color: var(--muted-light); margin-top: 4px; font-style: italic; }
.company-right { text-align: right; flex-shrink: 0; }
.bakiye { font-size: 12.5px; font-weight: 700; }
.bakiye.pos { color: var(--green); }
.bakiye.neg { color: var(--danger); }
.bakiye.zero { color: var(--muted-light); }
.status-pill { font-size: 10px; padding: 2.5px 9px; border-radius: 10px; font-weight: 700; margin-top: 5px; display: inline-block; }
.sp-cold { background: #E7E5F0; color: #5B5680; }
.sp-contacted { background: var(--blue-bg); color: var(--blue); }
.sp-replied { background: var(--green-bg); color: var(--green); }
.sp-sample { background: var(--orange-bg); color: var(--orange); }
.sp-order { background: #D1FAE5; color: #047857; }
.sp-dead { background: var(--danger-bg); color: var(--danger); }

.fu-wrap { padding: 11px 14px; }
.fu-item { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 11px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.fu-item:hover { border-color: var(--gold-mid); }
.fu-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.fu-dot.urgent { background: var(--danger); } .fu-dot.soon { background: var(--gold); } .fu-dot.ok { background: var(--green); }
.fu-info { flex: 1; min-width: 0; }
.fu-name { font-size: 13.5px; font-weight: 600; }
.fu-meta { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.fu-days { font-size: 12px; font-weight: 700; flex-shrink: 0; text-align: right; }
.fu-days.urgent { color: var(--danger); } .fu-days.soon { color: var(--gold); } .fu-days.ok { color: var(--muted); }

.log-wrap { padding: 11px 14px; }
.log-item { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.log-top { display: flex; justify-content: space-between; gap: 8px; }
.log-name { font-size: 13px; font-weight: 700; }
.log-date { font-size: 11px; color: var(--muted-light); }
.log-note { font-size: 13px; color: var(--text-sec); margin-top: 5px; line-height: 1.55; }
.log-tags { display: flex; gap: 5px; margin-top: 8px; }
.lt { font-size: 10px; padding: 2.5px 8px; border-radius: 8px; font-weight: 700; }
.lt-price { background: var(--danger-bg); color: var(--danger); }
.lt-interest { background: var(--green-bg); color: var(--green); }
.lt-sample { background: var(--gold-light); color: var(--gold); }
.lt-meeting { background: var(--purple-bg); color: var(--purple); }
.lt-generic { background: var(--surface3); color: var(--muted); }
.lt-view { background: var(--blue-bg); color: var(--blue); }

.goals-wrap { padding: 11px 14px; }
.goal-card { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 13px; margin-bottom: 9px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.goal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.goal-lbl { font-size: 13px; font-weight: 600; }
.goal-val { font-size: 13px; font-weight: 700; color: var(--gold); }
.goal-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
.goal-fill { height: 100%; border-radius: 3px; background: var(--gold); transition: width .4s; }
.goal-fill.green { background: var(--green); } .goal-fill.blue { background: var(--blue); }
.goal-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.frow2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(28,28,30,.5); z-index: 200; align-items: center; justify-content: center; padding: 14px; }
.overlay.on { display: flex; }
.modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 470px; max-height: 88vh; overflow-y: auto; padding: 20px 18px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
.modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 15px; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 10.5px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px; color: var(--text); font-size: 13.5px; outline: none; font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold-mid); box-shadow: 0 0 0 3px rgba(168,132,58,.08); }
.field textarea { resize: vertical; min-height: 65px; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal-actions .btn { flex: 1; justify-content: center; }

.sec-pad { padding: 13px 14px 0; }
.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 17px; height: 17px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; border-radius: 9px; padding: 0 4px; margin-left: 5px; }
.empty { text-align: center; padding: 42px 20px; color: var(--muted-light); }
.empty .icon { font-size: 32px; margin-bottom: 9px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 5px; }
.sync-dot.off { background: rgba(255,255,255,.3); }
.sync-status { font-size: 11px; color: rgba(255,255,255,.6); display: flex; align-items: center; white-space: nowrap; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,.25); display: none; max-width: 90vw; }
.toast.on { display: block; animation: toastIn .25s; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
.search-box { padding: 11px 14px 0; }
.search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 13px; font-size: 13.5px; outline: none; font-family: inherit; }
.search-box input:focus { border-color: var(--gold-mid); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Morello <span>Pipeline</span></div>
    <div class="hdr-sub">Export Sales Tracker</div>
  </div>
  <div class="hdr-actions">
    <span class="sync-status" id="sync-status"><span class="sync-dot off"></span>…</span>
    <a href="index.html" class="btn btn-dark-ghost btn-sm">📄 Proforma</a>
    <button class="btn btn-gold btn-sm" onclick="openAdd()">+ Firma</button>
  </div>
</div>

<div class="nav">
  <div class="nav-tab on" data-tab="pipeline" onclick="showTab('pipeline',this)">📋 Pipeline</div>
  <div class="nav-tab" data-tab="countries" onclick="showTab('countries',this)">🌍 Ülkeler</div>
  <div class="nav-tab" data-tab="followup" onclick="showTab('followup',this)">🔔 Takip<span id="fu-badge"></span></div>
  <div class="nav-tab" data-tab="log" onclick="showTab('log',this)">📝 Notlar</div>
  <div class="nav-tab" data-tab="goals" onclick="showTab('goals',this)">🎯 Hedefler</div>
</div>

<div id="page-pipeline" class="page on">
  <div class="week-bar" id="week-bar"></div>
  <div class="rotation" id="rotation-hint"></div>
  <div class="kanban-wrap"><div class="kanban" id="kanban-board"></div></div>
</div>

<div id="page-countries" class="page">
  <div class="import-card" id="import-card" style="display:none">
    <div class="import-title">📂 2020'den Bu Yana Morello Müşterileri</div>
    <div class="import-sub" id="import-sub">163 firma hazır (2020 cari + 2023 segmentasyon birleşik). Buluta eklemek için onayla.</div>
    <button class="btn btn-gold" id="import-btn" onclick="importSeed()">✅ Hepsini Buluta Ekle</button>
  </div>
  <div class="search-box"><input type="text" id="search-input" placeholder="🔍 Firma ara…" oninput="renderCountries()"></div>
  <div class="country-nav" id="country-nav"></div>
  <div class="company-list" id="company-list"></div>
</div>

<div id="page-followup" class="page">
  <div class="fu-wrap" id="fu-list"></div>
</div>

<div id="page-log" class="page">
  <div class="sec-pad"><div class="sec-head">
    <div class="sec-title">Notlar &amp; Feedback</div>
    <button class="btn btn-ghost btn-sm" onclick="openLog()">+ Not</button>
  </div></div>
  <div class="log-wrap" id="log-list"></div>
</div>

<div id="page-goals" class="page">
  <div class="goals-wrap">
    <div class="sec-head" style="margin-bottom:12px"><div class="sec-title">Bu Hafta</div></div>
    <div id="goals-section"></div>
    <div style="margin-top:18px">
      <div class="sec-head" style="margin-bottom:10px"><div class="sec-title">Hedefleri Düzenle</div></div>
      <div class="goal-card">
        <div class="frow2">
          <div class="field"><label>Haftalık Mesaj</label><input type="number" id="g-msg" value="30" onchange="saveGoals()"></div>
          <div class="field"><label>Görüşme</label><input type="number" id="g-meet" value="5" onchange="saveGoals()"></div>
        </div>
        <div class="field"><label>Yeni Firma</label><input type="number" id="g-new" value="10" onchange="saveGoals()"></div>
      </div>
    </div>
  </div>
</div>

<!-- CONTACT MODAL -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeOverlay()">
  <div class="modal">
    <div class="modal-title" id="modal-title">Firma Ekle</div>
    <div class="field"><label>Firma Adı *</label><input type="text" id="f-name"></div>
    <div class="frow2">
      <div class="field"><label>Ülke</label><input type="text" id="f-country" list="country-list"><datalist id="country-list"></datalist></div>
      <div class="field"><label>Şehir</label><input type="text" id="f-city"></div>
    </div>
    <div class="frow2">
      <div class="field"><label>Yetkili</label><input type="text" id="f-contact"></div>
      <div class="field"><label>Telefon / WA</label><input type="text" id="f-phone"></div>
    </div>
    <div class="field"><label>E-Posta</label><input type="email" id="f-email"></div>
    <div class="frow2">
      <div class="field"><label>Kanal</label>
        <select id="f-channel">
          <option value="wa">📱 WhatsApp</option><option value="mail">📧 E-Posta</option>
          <option value="visit">🤝 Ziyaret</option><option value="call">📞 Telefon</option>
        </select>
      </div>
      <div class="field"><label>Durum</label>
        <select id="f-status">
          <option value="cold">Cold</option><option value="contacted">Contacted</option>
          <option value="replied">Replied</option><option value="sample">Sample Sent</option>
          <option value="order">Order</option><option value="dead">Dead</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Son İletişim</label><input type="date" id="f-date"></div>
    <div class="field"><label>Not</label><textarea id="f-note"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlay()">İptal</button>
      <button class="btn btn-gold" onclick="saveContact()">Kaydet</button>
    </div>
    <div class="modal-actions" id="extra-actions" style="display:none">
      <button class="btn btn-ghost" id="wa-btn" onclick="openWA()">📱 WhatsApp</button>
      <button class="btn btn-ghost" onclick="gotoProforma()">📄 Proforma</button>
      <button class="btn btn-danger" onclick="deleteContact()">Sil</button>
    </div>
  </div>
</div>

<!-- LOG MODAL -->
<div class="overlay" id="log-overlay" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="modal">
    <div class="modal-title">Not Ekle</div>
    <div class="field"><label>Firma</label><input type="text" id="l-firm" list="firm-list"><datalist id="firm-list"></datalist></div>
    <div class="frow2">
      <div class="field"><label>Tarih</label><input type="date" id="l-date"></div>
      <div class="field"><label>Kategori</label>
        <select id="l-tag">
          <option value="interest">✅ İlgi Gösterdi</option><option value="price">💸 Fiyat Şikayeti</option>
          <option value="sample">📦 Numune/Katalog</option><option value="meeting">🤝 Görüşme</option>
          <option value="generic">📝 Genel Not</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Not</label><textarea id="l-note"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('log-overlay').classList.remove('on')">İptal</button>
      <button class="btn btn-gold" onclick="saveLog()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

let session = null, userId = null;

function loadSession(){
  const saved = localStorage.getItem('morello_session');
  if(!saved) return false;
  try {
    const s = JSON.parse(saved);
    const payload = JSON.parse(atob(s.access_token.split('.')[1]));
    if(payload.exp * 1000 > Date.now()){ session = s; userId = s.user.id; return true; }
  } catch(e){}
  return false;
}

async function supa(path, method, body){
  method = method || 'GET';
  const token = session ? session.access_token : SUPA_KEY;
  const opts = { method: method, headers: {
    'apikey': SUPA_KEY, 'Authorization': 'Bearer '+token,
    'Content-Type': 'application/json', 'Accept': 'application/json',
    'Prefer': (method==='POST'||method==='PATCH') ? 'return=representation' : ''
  }};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPA_URL+path, opts);
  const text = await r.text();
  if(!r.ok) throw new Error('HTTP '+r.status+': '+text);
  return (text && r.status!==204) ? JSON.parse(text) : [];
}

async function loadCloud(){
  try {
    const results = await Promise.all([
      supa('/rest/v1/pipeline_contacts?select=*&order=name.asc'),
      supa('/rest/v1/pipeline_logs?select=*&order=log_date.desc&limit=300')
    ]);
    contacts = results[0]; logs = results[1]; cloudOK = true;
    setSync(true);
    document.getElementById('import-card').style.display = contacts.length===0 ? 'block' : 'none';
    render();
  } catch(e){
    console.error(e); setSync(false);
    document.getElementById('import-card').style.display = 'block';
    document.getElementById('import-sub').textContent = 'Bulut hatası: '+e.message.slice(0,90)+' — Supabase tablolarını kurdun mu?';
    render();
  }
}

function setSync(ok){
  document.getElementById('sync-status').innerHTML =
    '<span class="sync-dot'+(ok?'':' off')+'"></span>'+(ok?'Bulut ✓':'Çevrimdışı');
}

async function importSeed(){
  if(!cloudOK){ toast('Bulut bağlantısı yok'); return; }
  document.getElementById('import-btn').disabled = true;
  toast('⏳ '+SEED.length+' firma ekleniyor…');
  const rows = SEED.map(function(s){ return {
    user_id: userId, name: s.name, country: s.country||'', city: s.city||'',
    channel: 'wa', status: 'cold', bakiye: s.bakiye||0, note: s.note||''
  };});
  try {
    await supa('/rest/v1/pipeline_contacts', 'POST', rows);
    toast('✅ '+rows.length+' firma buluta eklendi!');
    await loadCloud();
  } catch(e){ toast('❌ '+e.message.slice(0,80)); document.getElementById('import-btn').disabled=false; }
}

// ═══════════ HELPERS ═══════════
function today(){ return new Date().toISOString().slice(0,10); }
function daysSince(d){ if(!d) return 9999; return Math.floor((Date.now()-new Date(d))/86400000); }
function fmtDate(d){ if(!d) return '—'; const p=String(d).slice(0,10).split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function weekStart(){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(function(){t.classList.remove('on');}, 2600); }

  {id:'cold',label:'❄️ COLD',cls:'hc-cold'},{id:'contacted',label:'📤 CONTACTED',cls:'hc-contacted'},

const CH_TAG={wa:'tag-wa',mail:'tag-mail',visit:'tag-visit',call:'tag-call'};

function renderWeekBar(){
  const ws=weekStart();
  const tw=contacts.filter(function(c){return c.last_contact&&new Date(c.last_contact)>=ws&&c.status!=='cold';}).length;
  const orders=contacts.filter(function(c){return c.status==='order';}).length;
  const newA=contacts.filter(function(c){return c.created_at&&new Date(c.created_at)>=ws;}).length;
  const meetL=logs.filter(function(l){return l.tag==='meeting'&&l.log_date&&new Date(l.log_date)>=ws;}).length;
  document.getElementById('week-bar').innerHTML=
    '<div class="ws"><div class="v gold">'+tw+'</div><div class="l">Bu Hafta Mesaj</div></div>'+
    '<div class="ws"><div class="v">'+meetL+'</div><div class="l">Görüşme</div></div>'+
    '<div class="ws"><div class="v">'+newA+'</div><div class="l">Yeni Firma</div></div>'+
    '<div class="ws"><div class="v gold">'+orders+'</div><div class="l">Sipariş</div></div>';
}

function renderRotation(){
  const ws=weekStart();
  const msgCount=contacts.filter(function(c){return c.last_contact&&new Date(c.last_contact)>=ws&&c.status!=='cold';}).length;
  const pct=Math.min(100,Math.round(msgCount/goals.msg*100));
  const oR=contacts.filter(function(c){return c.status==='replied'&&daysSince(c.last_contact)>7;}).length;
  const oC=contacts.filter(function(c){return c.status==='contacted'&&daysSince(c.last_contact)>14;}).length;
  const cold=contacts.filter(function(c){return c.status==='cold';}).length;
  let tip='Pipeline temiz. Yeni firma araştırması vakti!';
  if(oR>0) tip=oR+' firmadan 7+ gündür cevap yok. Bir push mesajı at veya durumu kapat.';
  else if(oC>0) tip=oC+' firmaya 14+ gün önce mesaj atıldı, sessiz — re-contact rotasyonu zamanı.';
  else if(cold>5) tip=cold+" cold firma bekliyor. Bu hafta "+Math.min(cold,10)+" tanesine ilk mesajı at.";
  document.getElementById('rotation-hint').innerHTML=
    '<div class="rot-title">⚡ Rotasyon Önerisi</div><div class="rot-text">'+tip+'</div>'+
    '<div class="prog-row"><span>Haftalık mesaj hedefi</span><span>'+msgCount+' / '+goals.msg+'</span></div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
}

function renderKanban(){
  document.getElementById('kanban-board').innerHTML=STATUSES.map(function(st){
    const cards=contacts.filter(function(c){return c.status===st.id;});
    const h=cards.length?cards.map(function(c){
      const days=daysSince(c.last_contact);
      const urg=(c.status==='contacted'&&days>14&&days<9999)||(c.status==='replied'&&days>7&&days<9999);
      return '<div class="k-card" onclick="openEdit(\''+c.id+'\')"'+(urg?' style="border-color:var(--danger)"':'')+'>'+
        '<div class="k-cname">'+esc(c.name)+'</div>'+
        '<div class="k-country">'+esc([c.city,c.country].filter(Boolean).join(', '))+'</div>'+
        '<div class="k-ch"><span class="k-tag '+(CH_TAG[c.channel]||'tag-wa')+'">'+(CH_LABEL[c.channel]||'WA')+'</span></div>'+
        (c.last_contact?'<div class="k-date">'+fmtDate(c.last_contact)+'</div>':'')+
      '</div>';
    }).join(''):'<div class="k-empty">Boş</div>';
    return '<div class="k-col '+st.cls+'"><div class="k-head"><span class="k-label">'+st.label+'</span><span class="k-cnt">'+cards.length+'</span></div><div class="k-body">'+h+'</div></div>';
  }).join('');
}

function renderCountries(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const all=['Tümü'].concat([...new Set(contacts.map(function(c){return c.country;}).filter(Boolean))].sort());
  document.getElementById('country-nav').innerHTML=all.map(function(c){
    const cnt=c==='Tümü'?contacts.length:contacts.filter(function(x){return x.country===c;}).length;
    return '<div class="ctab'+(c===activeCountry?' on':'')+'" onclick="setCountry(this.dataset.c)" data-c="'+esc(c)+'">'+esc(c)+'<span class="cnt">'+cnt+'</span></div>';
  }).join('');
  let filtered=activeCountry==='Tümü'?contacts:contacts.filter(function(c){return c.country===activeCountry;});
  if(q) filtered=filtered.filter(function(c){return (c.name+' '+(c.city||'')+' '+(c.country||'')).toLowerCase().indexOf(q)>-1;});
  const sv={order:0,sample:1,replied:2,contacted:3,cold:4,dead:5};
  const sorted=filtered.slice().sort(function(a,b){return (sv[a.status]||4)-(sv[b.status]||4)||a.name.localeCompare(b.name);});
  document.getElementById('company-list').innerHTML=sorted.length?sorted.map(function(c){
    const bv=parseFloat(c.bakiye||0);
    const bcls=bv>0?'pos':(bv<0?'neg':'zero');
    const bstr=bv!==0?((bv>0?'+':'')+Number(bv).toLocaleString('tr-TR',{maximumFractionDigits:0})):'—';
    return '<div class="company-item" onclick="openEdit(\''+c.id+'\')">'+
      '<div class="company-main"><div class="company-name">'+esc(c.name)+'</div>'+
      '<div class="company-meta">'+esc([c.city,c.country].filter(Boolean).join(', '))+(c.contact_person?' · '+esc(c.contact_person):'')+'</div>'+
      (c.note?'<div class="company-note">'+esc(c.note)+'</div>':'')+'</div>'+
      '<div class="company-right"><div class="bakiye '+bcls+'">'+bstr+'</div>'+
      '<div class="status-pill sp-'+c.status+'">'+(SP_LBL[c.status]||c.status)+'</div></div></div>';
  }).join(''):'<div class="empty"><div class="icon">🗂️</div><p>Firma bulunamadı.</p></div>';
}
function setCountry(c){ activeCountry=c; renderCountries(); }

function renderFollowUp(){
  const urgent=[];
  contacts.forEach(function(c){
    if(c.status==='dead'||c.status==='order') return;
    const days=daysSince(c.last_contact);
    const th={contacted:14,replied:7,sample:10,cold:30}[c.status]||30;
    if(days>=th-3) urgent.push(Object.assign({},c,{days:days,th:th}));
  });
  urgent.sort(function(a,b){return b.days-a.days;});
  const realU=urgent.filter(function(u){return u.days>=u.th;});
  document.getElementById('fu-badge').innerHTML=realU.length?'<span class="badge">'+realU.length+'</span>':'';
  const el=document.getElementById('fu-list');
  if(!urgent.length){ el.innerHTML='<div class="empty"><div class="icon">✅</div><p>Takip edilecek firma yok.</p></div>'; return; }
  el.innerHTML=urgent.map(function(c){
    const over=c.days>=c.th, close=c.days>=c.th-3&&!over;
    const cls=over?'urgent':(close?'soon':'ok');
    const lbl=c.days>=9999?'Hiç iletişim yok':(over?(c.days-c.th+1)+' gün gecikti':(c.th-c.days)+' gün kaldı');
    return '<div class="fu-item" onclick="openEdit(\''+c.id+'\')">'+
      '<div class="fu-dot '+cls+'"></div>'+
      '<div class="fu-info"><div class="fu-name">'+esc(c.name)+'</div>'+
      '<div class="fu-meta">'+(SP_LBL[c.status]||'')+' · '+esc([c.city,c.country].filter(Boolean).join(', '))+'</div>'+
      (c.last_contact?'<div class="fu-meta">Son: '+fmtDate(c.last_contact)+'</div>':'')+
      '</div><div class="fu-days '+cls+'">'+lbl+'</div></div>';
  }).join('');
}

function renderLog(){
  const el=document.getElementById('log-list');
  if(!logs.length){ el.innerHTML='<div class="empty"><div class="icon">📝</div><p>Henüz not yok.</p></div>'; return; }
  const tagMap={price:'lt-price',interest:'lt-interest',sample:'lt-sample',meeting:'lt-meeting',generic:'lt-generic',view:'lt-view'};
  const tagLbl={price:'💸 Fiyat',interest:'✅ İlgi',sample:'📦 Numune',meeting:'🤝 Görüşme',generic:'📝 Not',view:'👁 Link Görüntüleme'};
  el.innerHTML=logs.map(function(l){return '<div class="log-item">'+
    '<div class="log-top"><div class="log-name">'+esc(l.firm_name)+'</div><div class="log-date">'+fmtDate(l.log_date)+'</div></div>'+
    (l.note?'<div class="log-note">'+esc(l.note)+'</div>':'')+
    '<div class="log-tags"><span class="lt '+(tagMap[l.tag]||'lt-generic')+'">'+(tagLbl[l.tag]||'Not')+'</span></div>'+
  '</div>';}).join('');
}

function renderGoals(){
  const ws=weekStart();
  const m=contacts.filter(function(c){return c.last_contact&&new Date(c.last_contact)>=ws&&c.status!=='cold';}).length;
  const mt=logs.filter(function(l){return l.tag==='meeting'&&l.log_date&&new Date(l.log_date)>=ws;}).length;
  const n=contacts.filter(function(c){return c.created_at&&new Date(c.created_at)>=ws;}).length;
  const items=[{l:'Mesaj Atılan Firma',c:m,g:goals.msg,col:''},{l:'Görüşme',c:mt,g:goals.meet,col:'blue'},{l:'Yeni Firma',c:n,g:goals.new,col:'green'}];
  document.getElementById('goals-section').innerHTML=items.map(function(i){
    const p=Math.min(100,Math.round(i.c/i.g*100));
    return '<div class="goal-card"><div class="goal-top"><div class="goal-lbl">'+i.l+'</div><div class="goal-val">'+i.c+' / '+i.g+'</div></div>'+
    '<div class="goal-bar"><div class="goal-fill '+i.col+'" style="width:'+p+'%"></div></div>'+
    '<div class="goal-sub">'+p+'% tamamlandı</div></div>';
  }).join('');
}
function saveGoals(){
  goals.msg=parseInt(document.getElementById('g-msg').value)||30;
  goals.meet=parseInt(document.getElementById('g-meet').value)||5;
  goals.new=parseInt(document.getElementById('g-new').value)||10;
  localStorage.setItem('mpl_goals',JSON.stringify(goals)); render();
}

// ═══════════ CRUD ═══════════
function openAdd(){
  editId=null;
  document.getElementById('modal-title').textContent='Firma Ekle';
  document.getElementById('extra-actions').style.display='none';
  ['name','country','city','contact','phone','email','note'].forEach(function(k){document.getElementById('f-'+k).value='';});
  document.getElementById('f-channel').value='wa';
  document.getElementById('f-status').value='cold';
  document.getElementById('f-date').value=today();
  document.getElementById('modal-overlay').classList.add('on');
}
function openEdit(id){
  const c=contacts.find(function(x){return x.id===id;}); if(!c) return;
  editId=id;
  document.getElementById('modal-title').textContent='Firma Düzenle';
  document.getElementById('extra-actions').style.display='flex';
  document.getElementById('f-name').value=c.name||'';
  document.getElementById('f-country').value=c.country||'';
  document.getElementById('f-city').value=c.city||'';
  document.getElementById('f-contact').value=c.contact_person||'';
  document.getElementById('f-phone').value=c.phone||'';
  document.getElementById('f-email').value=c.email||'';
  document.getElementById('f-channel').value=c.channel||'wa';
  document.getElementById('f-status').value=c.status||'cold';
  document.getElementById('f-date').value=c.last_contact||'';
  document.getElementById('f-note').value=c.note||'';
  document.getElementById('wa-btn').style.display=c.phone?'inline-flex':'none';
  document.getElementById('modal-overlay').classList.add('on');
}
async function saveContact(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ toast('Firma adı zorunlu'); return; }
  if(!cloudOK){ toast('Bulut bağlantısı yok'); return; }
  const data={
    name:name, country:document.getElementById('f-country').value.trim(),
    city:document.getElementById('f-city').value.trim(),
    contact_person:document.getElementById('f-contact').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    email:document.getElementById('f-email').value.trim(),
    channel:document.getElementById('f-channel').value,
    status:document.getElementById('f-status').value,
    last_contact:document.getElementById('f-date').value||null,
    note:document.getElementById('f-note').value.trim(),
    updated_at:new Date().toISOString()
  };
  try {
    if(editId){
      const upd=await supa('/rest/v1/pipeline_contacts?id=eq.'+editId,'PATCH',data);
      const idx=contacts.findIndex(function(c){return c.id===editId;});
      if(idx>-1&&upd[0]) contacts[idx]=upd[0];
    } else {
      data.user_id=userId;
      const ins=await supa('/rest/v1/pipeline_contacts','POST',data);
      if(ins[0]) contacts.push(ins[0]);
    }
    toast('✓ Kaydedildi');
    closeOverlay(); render();
  } catch(e){ toast('❌ '+e.message.slice(0,60)); }
}
async function deleteContact(){
  if(!confirm('Bu firmayı sil?')) return;
  try {
    await supa('/rest/v1/pipeline_contacts?id=eq.'+editId,'DELETE');
    contacts=contacts.filter(function(c){return c.id!==editId;});
    toast('Silindi'); closeOverlay(); render();
  } catch(e){ toast('❌ '+e.message.slice(0,60)); }
}
function closeOverlay(){ document.getElementById('modal-overlay').classList.remove('on'); editId=null; }

function openWA(){
  const c=contacts.find(function(x){return x.id===editId;}); if(!c||!c.phone) return;
  window.open('https://wa.me/'+c.phone.replace(/[^0-9]/g,''),'_blank');
}
function gotoProforma(){
  const c=contacts.find(function(x){return x.id===editId;}); if(!c) return;
  window.location.href='index.html?pipeline_customer='+encodeURIComponent(c.name);
}

// ═══════════ LOG CRUD ═══════════
function openLog(){
  document.getElementById('l-date').value=today();
  document.getElementById('l-firm').value='';
  document.getElementById('l-note').value='';
  document.getElementById('l-tag').value='interest';
  document.getElementById('log-overlay').classList.add('on');
}
async function saveLog(){
  const firm=document.getElementById('l-firm').value.trim();
  if(!firm){ toast('Firma adı gir'); return; }
  if(!cloudOK){ toast('Bulut bağlantısı yok'); return; }
  const match=contacts.find(function(c){return c.name.toLowerCase()===firm.toLowerCase();});
  const row={
    user_id:userId, contact_id:match?match.id:null, firm_name:firm,
    log_date:document.getElementById('l-date').value,
    tag:document.getElementById('l-tag').value,
    note:document.getElementById('l-note').value.trim()
  };
  try {
    const ins=await supa('/rest/v1/pipeline_logs','POST',row);
    if(ins[0]) logs.unshift(ins[0]);
    toast('✓ Not kaydedildi');
    document.getElementById('log-overlay').classList.remove('on');
    render();
  } catch(e){ toast('❌ '+e.message.slice(0,60)); }
}

  document.getElementById('import-sub').textContent='Giriş bulunamadı — önce Proforma sayfasından giriş yap, sonra bu sayfayı yenile.';
  render();
}
